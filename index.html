<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lumintale</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="c"></canvas>

  <button id="fullscreen-btn" aria-label="Toggle fullscreen">
    <svg id="fs-expand" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/>
      <line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
    </svg>
    <svg id="fs-collapse" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
      <polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/>
      <line x1="10" y1="14" x2="3" y2="21"/><line x1="21" y1="3" x2="14" y2="10"/>
    </svg>
  </button>

  <button id="settings-btn" aria-label="Settings">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"/>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
    </svg>
  </button>

  <div id="settings-panel">
    <p class="panel-title">Settings</p>

    <div class="setting-group">
      <div class="setting-row">
        <span class="setting-label">LED Density</span>
        <span class="setting-meta" id="density-val">10 /in</span>
      </div>
      <input type="range" id="density-slider" min="5" max="20" value="10" step="1" autocomplete="off">
    </div>

    <div class="divider"></div>

    <div class="setting-group">
      <div class="setting-row">
        <span class="setting-label">Lights On</span>
        <span class="setting-meta" id="coverage-val">18%</span>
      </div>
      <input type="range" id="coverage-slider" min="1" max="90" value="18" step="1" autocomplete="off">
    </div>

    <div class="divider"></div>

    <div class="setting-group">
      <div class="setting-row">
        <span class="setting-label">Flicker Speed</span>
        <span class="setting-meta" id="speed-val">Normal</span>
      </div>
      <input type="range" id="speed-slider" min="1" max="5" value="3" step="1" autocomplete="off">
    </div>

    <div class="divider"></div>

    <div class="setting-row">
      <span class="setting-label">Light Mode</span>
      <div class="toggle" id="mode-toggle"><div class="toggle-thumb"></div></div>
    </div>
  </div>

  <script>
    let SPACING = 10;
    const RADIUS = 1.5;
    let isLightMode = false;

    const getBgColor  = () => isLightMode ? '#e0e0e0' : '#1f1f1f';
    const getOffColor = () => isLightMode ? '#c2c2c2' : '#181818';
    const getLedColor = () => isLightMode ? '#d63031' : '#f5d76e';

    const canvas = document.getElementById('c');
    const ctx    = canvas.getContext('2d');

    let COLS, ROWS, TOTAL;

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
      COLS  = Math.floor(canvas.width  / SPACING);
      ROWS  = Math.floor(canvas.height / SPACING);
      TOTAL = COLS * ROWS;
      init();
    }

    let state, litSet, TARGET_ON;
    let TARGET_RATIO = 0.18;

    function init() {
      state     = new Uint8Array(TOTAL);
      litSet    = new Set();
      TARGET_ON = Math.floor(TOTAL * TARGET_RATIO);
      for (let i = 0; i < TARGET_ON; i++) turnOnRandom();
      drawAll();
    }

    function turnOnRandom() {
      if (litSet.size >= TOTAL) return;
      let idx;
      do { idx = (Math.random() * TOTAL) | 0; } while (state[idx] !== 0);
      state[idx] = 1;
      litSet.add(idx);
    }

    function dotXY(idx) {
      const col = idx % COLS;
      const row = (idx / COLS) | 0;
      return [(col + 0.5) * SPACING, (row + 0.5) * SPACING];
    }

    function drawDot(idx) {
      const [x, y] = dotXY(idx);
      ctx.beginPath();
      ctx.arc(x, y, RADIUS, 0, Math.PI * 2);
      ctx.fillStyle = state[idx] ? getLedColor() : getOffColor();
      ctx.fill();
    }

    function drawAll() {
      ctx.fillStyle = getBgColor();
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      for (let i = 0; i < TOTAL; i++) drawDot(i);
    }

    const dirty = new Set();

    function flicker() {
      const delta = Math.abs(litSet.size - TARGET_ON);
      const changes = Math.min(Math.max(4, delta >> 3), 300);
      for (let c = 0; c < changes; c++) {
        if (litSet.size < TARGET_ON) {
          const prev = litSet.size;
          turnOnRandom();
          if (litSet.size > prev) dirty.add([...litSet][litSet.size - 1]);
        } else if (litSet.size > TARGET_ON || Math.random() < 0.5) {
          if (litSet.size > 0) {
            const arr = [...litSet];
            const idx = arr[(Math.random() * arr.length) | 0];
            dirty.add(idx); state[idx] = 0; litSet.delete(idx);
          }
        } else {
          if (litSet.size > 0) {
            const arr = [...litSet];
            const offIdx = arr[(Math.random() * arr.length) | 0];
            dirty.add(offIdx); state[offIdx] = 0; litSet.delete(offIdx);
          }
          let idx;
          do { idx = (Math.random() * TOTAL) | 0; } while (state[idx] !== 0);
          state[idx] = 1; litSet.add(idx); dirty.add(idx);
        }
      }
      for (const idx of dirty) {
        const [x, y] = dotXY(idx);
        const r = RADIUS + 1;
        ctx.fillStyle = getBgColor();
        ctx.fillRect(x - r, y - r, r * 2, r * 2);
        drawDot(idx);
      }
      dirty.clear();
    }

    // ---- Settings ----
    const settingsBtn   = document.getElementById('settings-btn');
    const settingsPanel = document.getElementById('settings-panel');
    const densitySlider  = document.getElementById('density-slider');
    const densityValEl   = document.getElementById('density-val');
    const coverageSlider = document.getElementById('coverage-slider');
    const coverageValEl  = document.getElementById('coverage-val');
    const modeToggle     = document.getElementById('mode-toggle');
    let panelOpen = false;

    const fullscreenBtn = document.getElementById('fullscreen-btn');
    const fsExpand   = document.getElementById('fs-expand');
    const fsCollapse = document.getElementById('fs-collapse');

    function isFullscreen() {
      return !!(document.fullscreenElement || document.webkitFullscreenElement);
    }

    function updateFsIcon() {
      const fs = isFullscreen();
      fsExpand.style.display   = fs ? 'none'  : '';
      fsCollapse.style.display = fs ? ''      : 'none';
    }

    fullscreenBtn.addEventListener('click', () => {
      if (!isFullscreen()) {
        const el = document.documentElement;
        (el.requestFullscreen || el.webkitRequestFullscreen).call(el);
      } else {
        (document.exitFullscreen || document.webkitExitFullscreen).call(document);
      }
    });

    document.addEventListener('fullscreenchange', updateFsIcon);
    document.addEventListener('webkitfullscreenchange', updateFsIcon);

    document.addEventListener('mousemove', (e) => {
      const rs = settingsBtn.getBoundingClientRect();
      const rf = fullscreenBtn.getBoundingClientRect();
      const distS = Math.hypot(e.clientX - (rs.left + rs.width / 2), e.clientY - (rs.top + rs.height / 2));
      const distF = Math.hypot(e.clientX - (rf.left + rf.width / 2), e.clientY - (rf.top + rf.height / 2));
      const near = distS < 160 || distF < 160;
      settingsBtn.classList.toggle('near', near);
      fullscreenBtn.classList.toggle('near', near);
    });

    settingsBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      panelOpen ? closePanel() : openPanel();
    });

    function openPanel() {
      panelOpen = true;
      settingsPanel.classList.remove('closing');
      settingsPanel.classList.add('open');
    }

    function closePanel() {
      if (!panelOpen) return;
      panelOpen = false;
      settingsPanel.classList.add('closing');
      settingsPanel.addEventListener('animationend', () => {
        settingsPanel.classList.remove('open', 'closing');
      }, { once: true });
    }

    document.addEventListener('click', (e) => {
      if (panelOpen && !settingsPanel.contains(e.target) && e.target !== settingsBtn) closePanel();
    });

    densitySlider.addEventListener('input', () => {
      const lpi = parseInt(densitySlider.value);
      densityValEl.textContent = lpi + ' /in';
      SPACING = Math.max(5, Math.round(96 / lpi));
      resize();
    });

    coverageSlider.addEventListener('input', () => {
      const pct = parseInt(coverageSlider.value);
      coverageValEl.textContent = pct + '%';
      TARGET_RATIO = pct / 100;
      TARGET_ON = Math.floor(TOTAL * TARGET_RATIO);
    });

    modeToggle.addEventListener('click', () => {
      isLightMode = !isLightMode;
      modeToggle.classList.toggle('active', isLightMode);
      document.body.classList.toggle('light-mode', isLightMode);
      drawAll();
    });

    const speedSlider = document.getElementById('speed-slider');
    const speedValEl  = document.getElementById('speed-val');

    const SPEED_MAP    = [20, 50, 80, 160, 320];
    const SPEED_LABELS = ['Fast', 'Faster', 'Normal', 'Slower', 'Slow'];
    let flickerInterval = SPEED_MAP[2];
    let flickerTimer = null;

    function startFlicker() {
      if (flickerTimer) clearInterval(flickerTimer);
      flickerTimer = setInterval(flicker, flickerInterval);
    }

    speedSlider.addEventListener('input', () => {
      const idx = parseInt(speedSlider.value) - 1;
      flickerInterval = SPEED_MAP[idx];
      speedValEl.textContent = SPEED_LABELS[idx];
      startFlicker();
    });

    // Reset all controls to their defaults on every load
    densitySlider.value  = 10;
    densityValEl.textContent = '10 /in';
    SPACING = Math.max(5, Math.round(96 / 10));

    coverageSlider.value = 18;
    coverageValEl.textContent = '18%';
    TARGET_RATIO = 0.18;

    speedSlider.value = 3;
    speedValEl.textContent = 'Normal';
    flickerInterval = SPEED_MAP[2];

    isLightMode = false;
    modeToggle.classList.remove('active');
    document.body.classList.remove('light-mode');

    window.addEventListener('resize', resize);
    resize();
    startFlicker();
  </script>
</body>
</html>
